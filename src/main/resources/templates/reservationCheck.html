<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/head :: common-head(title='라온아띠 - 예약 조회')}"></head>

<body>
<header th:replace="~{fragments/header :: common-header}"></header>

<main>
    <section class="page-hero reserve-hero" style="height: 300px;">
        <div class="page-hero-overlay"></div>
        <div class="container page-hero-content">
            <h1 class="page-title">Check My Booking</h1>
            <p class="page-subtitle">예약 시 입력하신 정보로 예약 상태를 확인해주세요.</p>
        </div>
    </section>

    <section class="section container">
        <div class="info-block no-border" style="max-width: 480px; margin: 0 auto;">

            <form id="check-form">
                <div class="form-group">
                    <label for="check-name">예약자 성함</label>
                    <input type="text" id="check-name" placeholder="홍길동" required>
                </div>

                <div class="form-group">
                    <label for="check-phone">연락처</label>
                    <input type="tel" id="check-phone" placeholder="01012345678" required>
                </div>

                <div class="form-group">
                    <label for="check-password">예약 확인 비밀번호 (숫자 4자리)</label>
                    <input type="password" id="check-password" placeholder="1234" maxlength="4" required>
                </div>

                <button type="submit" id="btn-check-booking" class="btn btn-primary full-width">조회하기</button>
            </form>

            <div id="check-result" class="mt-20"></div>

        </div>
    </section>
</main>

<footer th:replace="~{fragments/footer :: common-footer}"></footer>

<script th:src="@{/js/booking-check.js}"></script>

</body>
</html>
